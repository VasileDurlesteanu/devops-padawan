#Test
name: Infrastructure Pipeline with Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - 'IaC/**'
  push:
    branches:
      - main
    paths:
      - 'IaC/**'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_IN_AUTOMATION: "true"

jobs:
  terraform-check:
    name: TF Validate & Plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stg, prod]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Format Check
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} fmt -check

      - name: Terraform Init
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} init

      - name: Terraform Validate
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} validate

      - name: Terraform Plan
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} plan -no-color

  deploy-dev:
    name: Deploy Development (dev)
    needs: terraform-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=IaC/envs/dev init

      - name: Terraform Apply
        run: terraform -chdir=IaC/envs/dev apply -auto-approve

  deploy-prod:
    name: Deploy Production (prod)
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=IaC/envs/prod init

      - name: Terraform Apply
        run: terraform -chdir=IaC/envs/prod apply -auto-approve