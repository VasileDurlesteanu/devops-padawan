name: Infrastructure Pipeline with Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - 'IaC/**'
  push:
    branches:
      - main
    paths:
      - 'IaC/**'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_IN_AUTOMATION: "true"

jobs:
  # Stage 1: Validate and Plan across all environments concurrently
  terraform-check:
    name: TF Validate & Plan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stg, prod]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform Format Check
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} fmt -check

      - name: Terraform Init
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} init

      - name: Terraform Validate
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} validate

      - name: Terraform Plan
        run: terraform -chdir=IaC/envs/${{ matrix.environment }} plan -no-color

  # Stage 2: Automatic execution for the Development environment on main branch pushes
  deploy-dev:
    name: Deploy Development (dev)
    needs: terraform-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Spin up a temporary local Kubernetes cluster inside the GitHub runner
      - name: Create Local Kubernetes Cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: "v0.20.0"

      # This step ensures Terraform knows where to find the new temporary cluster
      - name: Configure Kubeconfig Route
        run: |
          mkdir -p ~/.kube
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=IaC/envs/dev init

      - name: Terraform Apply
        run: terraform -chdir=IaC/envs/dev apply -auto-approve

  # Stage 3: Guarded execution for the Production environment requiring manual approval
  deploy-prod:
    name: Deploy Production (prod)
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Repeat for production when decided to approve and run it
      - name: Create Local Kubernetes Cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: "v0.20.0"

      - name: Configure Kubeconfig Route
        run: |
          mkdir -p ~/.kube
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=IaC/envs/prod init

      - name: Terraform Apply
        run: terraform -chdir=IaC/envs/prod apply -auto-approve